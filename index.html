    <script>
        // 1. Inisialisasi Aman PDF Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // 2. Kamus Warna M3 Pre-Kalkulasi (Cepat, Anti-Crash)
        const M3_PALETTES = {
            purple: {
                light: `--md-sys-color-primary:#6750A4;--md-sys-color-on-primary:#FFFFFF;--md-sys-color-primary-container:#EADDFF;--md-sys-color-on-primary-container:#21005D;--md-sys-color-secondary-container:#E8DEF8;--md-sys-color-on-secondary-container:#1D192B;--md-sys-color-tertiary-container:#FFD8E4;--md-sys-color-on-tertiary-container:#31111D;--md-sys-color-background:#FFFBFE;--md-sys-color-on-background:#1C1B1F;--md-sys-color-surface:#FFFBFE;--md-sys-color-on-surface:#1C1B1F;--md-sys-color-surface-variant:#E7E0EC;--md-sys-color-on-surface-variant:#49454F;`,

                dark: `--md-sys-color-primary:#6CDBBA;--md-sys-color-on-primary:#003825;--md-sys-color-primary-container:#005138;--md-sys-color-on-primary-container:#89F8D6;--md-sys-color-secondary-container:#334B3F;--md-sys-color-on-secondary-container:#CCE8DB;--md-sys-color-tertiary-container:#204D59;--md-sys-color-on-tertiary-container:#BEEAF6;--md-sys-color-background:#191C1A;--md-sys-color-on-background:#E1E3DF;--md-sys-color-surface:#191C1A;--md-sys-color-on-surface:#E1E3DF;--md-sys-color-surface-variant:#404943;--md-sys-color-on-surface-variant:#BFC9C3;`
            },
            rose: {
                light: `--md-sys-color-primary:#984061;--md-sys-color-on-primary:#FFFFFF;--md-sys-color-primary-container:#FFD9E2;--md-sys-color-on-primary-container:#3E001D;--md-sys-color-secondary-container:#FFD9E2;--md-sys-color-on-secondary-container:#2B151C;--md-sys-color-tertiary-container:#FFD8CA;--md-sys-color-on-tertiary-container:#321204;--md-sys-color-background:#FFFBFF;--md-sys-color-on-background:#201A1B;--md-sys-color-surface:#FFFBFF;--md-sys-color-on-surface:#201A1B;--md-sys-color-surface-variant:#F4DDDF;--md-sys-color-on-surface-variant:#524346;`,
                dark: `--md-sys-color-primary:#FFB1C8;--md-sys-color-on-primary:#5E1133;--md-sys-color-primary-container:#7B294A;--md-sys-color-on-primary-container:#FFD9E2;--md-sys-color-secondary-container:#5C3F46;--md-sys-color-on-secondary-container:#FFD9E2;--md-sys-color-tertiary-container:#653B2A;--md-sys-color-on-tertiary-container:#FFD8CA;--md-sys-color-background:#201A1B;--md-sys-color-on-background:#ECE0E1;--md-sys-color-surface:#201A1B;--md-sys-color-on-surface:#ECE0E1;--md-sys-color-surface-variant:#524346;--md-sys-color-on-surface-variant:#D7C1C4;`
            },
            blue: {
                light: `--md-sys-color-primary:#0061A4;--md-sys-color-on-primary:#FFFFFF;--md-sys-color-primary-container:#D1E4FF;--md-sys-color-on-primary-container:#001D36;--md-sys-color-secondary-container:#D7E3F7;--md-sys-color-on-secondary-container:#101C2B;--md-sys-color-tertiary-container:#E2E2FF;--md-sys-color-on-tertiary-container:#191637;--md-sys-color-background:#FDFBFF;--md-sys-color-on-background:#1A1C1E;--md-sys-color-surface:#FDFBFF;--md-sys-color-on-surface:#1A1C1E;--md-sys-color-surface-variant:#DFE2EB;--md-sys-color-on-surface-variant:#43474E;`,
                dark: `--md-sys-color-primary:#9ECAFF;--md-sys-color-on-primary:#003258;--md-sys-color-primary-container:#00497D;--md-sys-color-on-primary-container:#D1E4FF;--md-sys-color-secondary-container:#3B4858;--md-sys-color-on-secondary-container:#D7E3F7;--md-sys-color-tertiary-container:#423F62;--md-sys-color-on-tertiary-container:#E2E2FF;--md-sys-color-background:#1A1C1E;--md-sys-color-on-background:#E2E2E6;--md-sys-color-surface:#1A1C1E;--md-sys-color-on-surface:#E2E2E6;--md-sys-color-surface-variant:#43474E;--md-sys-color-on-surface-variant:#C3C7CF;`
            },
            orange: {
                light: `--md-sys-color-primary:#8F4C38;--md-sys-color-on-primary:#FFFFFF;--md-sys-color-primary-container:#FFDBD1;--md-sys-color-on-primary-container:#3A0B01;--md-sys-color-secondary-container:#FFDBD1;--md-sys-color-on-secondary-container:#2C150F;--md-sys-color-tertiary-container:#F7D8B7;--md-sys-color-on-tertiary-container:#271600;--md-sys-color-background:#FFF8F6;--md-sys-color-on-background:#221A18;--md-sys-color-surface:#FFF8F6;--md-sys-color-on-surface:#221A18;--md-sys-color-surface-variant:#F5DED8;--md-sys-color-on-surface-variant:#53433F;`,
                dark: `--md-sys-color-primary:#FFB5A0;--md-sys-color-on-primary:#561F0F;--md-sys-color-primary-container:#723523;--md-sys-color-on-primary-container:#FFDBD1;--md-sys-color-secondary-container:#5D3F37;--md-sys-color-on-secondary-container:#FFDBD1;--md-sys-color-tertiary-container:#524029;--md-sys-color-on-tertiary-container:#F7D8B7;--md-sys-color-background:#221A18;--md-sys-color-on-background:#EAE0DD;--md-sys-color-surface:#221A18;--md-sys-color-on-surface:#EAE0DD;--md-sys-color-surface-variant:#53433F;--md-sys-color-on-surface-variant:#D8C2BC;`
            }
        };

        const DOM = {
            lib: document.getElementById('library-view'), read: document.getElementById('reader-view'),
            grid: document.getElementById('book-grid'), empty: document.getElementById('empty-state'),
            load: document.getElementById('loading-state'), loadTxt: document.getElementById('loading-text'),
            loadBar: document.getElementById('loading-bar'), loadPct: document.getElementById('loading-percent'),
            loadSub: document.getElementById('loading-subtext'), file: document.getElementById('pdf-upload'), 
            backBtn: document.getElementById('btn-back'), inner: document.getElementById('reader-inner'), 
            title: document.getElementById('reader-title'), count: document.getElementById('library-count'), 
            colorBtn: document.getElementById('color-picker-btn'), colorModal: document.getElementById('color-modal'), 
            colorSheet: document.getElementById('color-sheet'), themeToggle: document.getElementById('theme-toggle')
        };

        let library = [];

        // 3. Engine Tema Dirombak Total (Aman dari DOM konflik)
        let isDark = localStorage.getItem('theme') === 'dark';
        let currentThemeKey = localStorage.getItem('m3-key') || 'purple';

        function applyThemeToDOM() {
            // Pasang dark mode class
            document.documentElement.classList.toggle('dark', isDark);
            
            // Render CSS Variables berdasarkan mode dan warna
            const mode = isDark ? 'dark' : 'light';
            const cssString = `:root { ${M3_PALETTES[currentThemeKey][mode]} }`;
            document.getElementById('dynamic-theme').innerHTML = cssString;

            // Injeksi ulang icon biar gak crash gara2 tergantikan lucide
            DOM.themeToggle.innerHTML = `<i data-lucide="${isDark ? 'sun' : 'moon'}"></i>`;
            lucide.createIcons();
            
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            localStorage.setItem('m3-key', currentThemeKey);
        }

        window.setTheme = function(key) {
            currentThemeKey = key;
            applyThemeToDOM();
            closeColorModal();
        };

        DOM.themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            applyThemeToDOM();
        });

        DOM.colorBtn.addEventListener('click', () => {
            DOM.colorModal.classList.remove('hidden');
            // Sedikit jeda buat animasi naik
            requestAnimationFrame(() => DOM.colorSheet.classList.remove('translate-y-full'));
        });

        window.closeColorModal = function() {
            DOM.colorSheet.classList.add('translate-y-full');
            setTimeout(() => DOM.colorModal.classList.add('hidden'), 300);
        };

        // Eksekusi tema pertama kali
        applyThemeToDOM();

        // 4. Logika Utama App (Library & Reader)
        async function loadLibrary() {
            try { 
                library = await localforage.getItem('pdf_data') || []; 
                renderLibrary(); 
            } catch (e) { 
                console.error("LocalForage Error:", e); 
            }
        }

        function renderLibrary() {
            DOM.grid.innerHTML = '';
            DOM.count.textContent = `${library.length} Dokumen`;
            
            if (library.length === 0) {
                DOM.empty.classList.remove('hidden'); 
                DOM.grid.classList.add('hidden');
            } else {
                DOM.empty.classList.add('hidden'); 
                DOM.grid.classList.remove('hidden');
                
                library.forEach((book, index) => {
                    const card = document.createElement('div');
                    const shape = index % 2 === 0 ? 'rounded-tl-[48px] rounded-br-[48px] rounded-tr-xl rounded-bl-xl' : 'rounded-tr-[48px] rounded-bl-[48px] rounded-tl-xl rounded-br-xl';
                    const color = index % 3 === 0 ? 'bg-m3-primaryContainer text-m3-onPrimaryContainer' : (index % 3 === 1 ? 'bg-m3-secondaryContainer text-m3-onSecondaryContainer' : 'bg-m3-surfaceVariant text-m3-onSurfaceVariant');

                    card.className = `${color} ${shape} p-8 relative cursor-pointer shadow-sm card-morph`;
                    card.innerHTML = `
                        <button onclick="deleteBook('${book.id}', event)" class="absolute top-4 right-4 p-3 bg-black/10 dark:bg-white/10 rounded-full hover:bg-black/20 btn-morph z-10">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                        <i data-lucide="book-open" class="w-10 h-10 mb-6 opacity-80"></i>
                        <h3 class="font-medium text-2xl leading-tight mb-2 line-clamp-3">${book.title}</h3>
                        <p class="text-sm opacity-70 mt-4 font-medium">${book.pages} Halaman</p>
                    `;
                    card.onclick = () => openBook(book);
                    DOM.grid.appendChild(card);
                });
                lucide.createIcons();
            }
        }

        window.deleteBook = async function(id, event) {
            event.stopPropagation();
            if(!confirm("Yakin hapus buku ini?")) return;
            library = library.filter(b => b.id !== id);
            await localforage.setItem('pdf_data', library);
            renderLibrary();
        };

        function openBook(book) {
            DOM.lib.classList.add('hidden');
            DOM.read.classList.remove('hidden'); 
            DOM.read.classList.add('flex');
            DOM.title.textContent = book.title;
            DOM.inner.innerHTML = '';
            
            book.nodes.forEach(node => {
                const el = document.createElement(node.tag);
                el.textContent = node.text;
                if (node.tag === 'h1') el.className = "text-4xl font-medium tracking-tight mt-12 mb-6 text-m3-onBg leading-tight";
                else if (node.tag === 'h2') el.className = "text-2xl font-medium mt-10 mb-4 text-m3-onBg opacity-90";
                else el.className = "font-serif text-[1.15rem] leading-[1.8] text-m3-onSurface opacity-85 text-justify mb-5";
                DOM.inner.appendChild(el);
            });
            DOM.read.querySelector('#reader-content').scrollTop = 0;
        }

        DOM.backBtn.addEventListener('click', () => {
            DOM.read.classList.add('hidden'); 
            DOM.read.classList.remove('flex'); 
            DOM.lib.classList.remove('hidden');
        });

        // 5. Engine Ekstraksi PDF (Dibikin lebih kebal)
        DOM.file.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            DOM.load.classList.remove('hidden');
            DOM.loadBar.style.width = '5%';
            DOM.loadPct.textContent = '0%';
            DOM.loadTxt.textContent = `Membaca File PDF...`;
            DOM.loadSub.textContent = file.name;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const pdf = await loadingTask.promise;
                const numPages = pdf.numPages;
                
                if(numPages === 0) throw new Error("Dokumen kosong");

                let allItems = []; 
                
                for (let i = 1; i <= numPages; i++) {
                    const percent = Math.round((i / numPages) * 100);
                    
                    // Jeda UI Update
                    await new Promise(r => setTimeout(r, 10));
                    
                    DOM.loadTxt.textContent = `Mengekstrak Halaman ${i}`;
                    DOM.loadBar.style.width = `${percent}%`;
                    DOM.loadPct.textContent = `${percent}%`;

                    try {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        
                        textContent.items.forEach(item => {
                            if (item.str.trim() === '') return;
                            allItems.push({
                                text: item.str,
                                height: item.transform[0],
                                y: item.transform[5]
                            });
                        });
                    } catch (e) {
                        console.warn(`Hal ${i} dilewati (error)`, e);
                    }
                }

                DOM.loadTxt.textContent = "Menyusun Tipografi...";
                DOM.loadBar.style.width = `100%`;
                await new Promise(r => setTimeout(r, 50));

                if(allItems.length === 0) throw new Error("PDF kosong atau hanya berisi gambar (hasil scan).");

                let totalHeight = 0;
                allItems.forEach(i => totalHeight += i.height);
                const avgHeight = totalHeight / allItems.length;
                
                let parsedNodes = [];
                let currentParagraph = "";
                let lastY = -1;

                allItems.forEach(item => {
                    if (lastY !== -1 && Math.abs(item.y - lastY) > avgHeight * 1.5) {
                        if (currentParagraph.trim() !== "") {
                            parsedNodes.push({ tag: 'p', text: currentParagraph.trim() });
                            currentParagraph = "";
                        }
                    }

                    if (item.height > avgHeight * 1.5) {
                        if (currentParagraph.trim() !== "") {
                             parsedNodes.push({ tag: 'p', text: currentParagraph.trim() });
                             currentParagraph = "";
                        }
                        parsedNodes.push({ tag: 'h1', text: item.text.trim() });
                    } 
                    else if (item.height > avgHeight * 1.2) {
                        if (currentParagraph.trim() !== "") {
                             parsedNodes.push({ tag: 'p', text: currentParagraph.trim() });
                             currentParagraph = "";
                        }
                        parsedNodes.push({ tag: 'h2', text: item.text.trim() });
                    }
                    else {
                        currentParagraph += item.text + " ";
                    }
                    lastY = item.y;
                });
                
                if (currentParagraph.trim() !== "") parsedNodes.push({ tag: 'p', text: currentParagraph.trim() });

                let cleanedNodes = [];
                for(let i=0; i<parsedNodes.length; i++) {
                    let curr = parsedNodes[i];
                    if (cleanedNodes.length > 0) {
                        let prev = cleanedNodes[cleanedNodes.length-1];
                        if (curr.tag === prev.tag && (curr.tag === 'h1' || curr.tag === 'h2')) {
                            prev.text += " " + curr.text;
                            continue;
                        }
                    }
                    cleanedNodes.push(curr);
                }

                const newBook = {
                    id: Date.now().toString(),
                    title: file.name.replace('.pdf', ''),
                    nodes: cleanedNodes,
                    pages: numPages
                };

                library.push(newBook);
                await localforage.setItem('pdf_data', library);
                renderLibrary();

            } catch (err) {
                alert(`Gagal: ${err.message}`);
            } finally {
                setTimeout(() => {
                    DOM.load.classList.add('hidden');
                    DOM.file.value = ''; 
                }, 1000);
            }
        });

        // Gas jalanin!
        loadLibrary();
    </script>
</body>
</html>
